# HemoLink Infrastructure Blueprint
# Use this on Render.com: "New +" -> "Blueprint"

services:
  # 1. Backend Web Service
  - type: web
    name: hemolink-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # Render will prompt you for this
      - key: JWT_SECRET
        generateValue: true # Render will generate a secure key for you
      - key: FRONTEND_URL
        fromService:
          type: static_site
          name: hemolink-frontend
          property: url

  # 2. Frontend Static Site
  - type: web
    name: hemolink-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: hemolink-backend
          property: url
      - key: REACT_APP_SOCKET_URL
        fromService:
          type: web
          name: hemolink-backend
          property: url
