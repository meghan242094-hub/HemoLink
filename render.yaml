# HemoLink Infrastructure Blueprint
# Use this on Render.com: "New +" -> "Blueprint"

services:
  # 1. Backend Web Service (Node/Express)
  - type: web
    name: hemolink-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # Paste your MongoDB Atlas connection string here
      - key: JWT_SECRET
        generateValue: true # Render will generate a secure key for you
      - key: FRONTEND_URL
        sync: false # Set this to your frontend URL after deployment
        # Example: https://hemolink-frontend.onrender.com

  # 2. Frontend Static Site (React)
  - type: web
    name: hemolink-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false # Set this to your backend URL after deployment
        # Example: https://hemolink-backend.onrender.com
      - key: REACT_APP_SOCKET_URL
        sync: false # Same as above
